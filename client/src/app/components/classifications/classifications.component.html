<h2>Classifications</h2>

<p>Select mountain classification to view.</p>

<div style="display: flex;">
    <mat-form-field appearance="fill">
        <mat-label>Classification</mat-label>
        <mat-select [(value)]="id" [(disabled)]="loading" (selectionChange)="onClassificationChange($event)">
            <mat-option *ngFor="let c of all" [value]="c.id">
                {{c.name}}
            </mat-option>
        </mat-select>
    </mat-form-field>
    <mat-spinner diameter="50" *ngIf="loading"></mat-spinner>
</div>

<mat-tab-group *ngIf="id">
    <mat-tab label="Map">
        <app-map [mountains]="mountains"></app-map>
    </mat-tab>
    <mat-tab label="List">
        <app-mountain-table [mountains]="mountains"></app-mountain-table>
    </mat-tab>
</mat-tab-group>
