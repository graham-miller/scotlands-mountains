<mat-form-field appearance="fill" *ngIf="classifications">
    <mat-label>Classification</mat-label>
    <mat-select [(value)]="selectedClassificationId" (selectionChange)="onClassificationChange($event)">
        <mat-option *ngFor="let classification of classifications" [value]="classification.id">
            {{classification.name}}
        </mat-option>
    </mat-select>
</mat-form-field>

<div *ngIf="selectedClassificationId">
    <mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>
            <mat-cell *matCellDef="let row">{{row.name}}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="height">
            <mat-header-cell *matHeaderCellDef mat-sort-header class="mat-cell-right" start="desc">Height</mat-header-cell>
            <mat-cell *matCellDef="let row" class="mat-cell-right">{{row.height | number:'1.0-0'}}m</mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

    </mat-table>
    <mat-paginator hidePageSize="true" pageSize="10" showFirstLastButtons></mat-paginator>
</div>
