<h2>Classifications</h2>

<div style="display: flex;">
    <mat-form-field appearance="fill">
        <mat-label>Classification</mat-label>
        <mat-select [(value)]="id" [(disabled)]="loading" (selectionChange)="onClassificationChange($event)">
            <mat-option *ngFor="let c of all" [value]="c.id">
                {{c.name}}
            </mat-option>
        </mat-select>
    </mat-form-field>
    <mat-spinner diameter="35" *ngIf="loading"></mat-spinner>
    <div id="classification-description" *ngIf="(!loading) && description">
        <mat-icon>info</mat-icon>{{description}}
    </div>
</div>

<mat-tab-group>
    <mat-tab label="Map">
        <app-map [mountains]="mountains"></app-map>
    </mat-tab>
    <mat-tab label="List" [disabled]="!id">
        <app-mountain-table [mountains]="mountains"></app-mountain-table>
    </mat-tab>
</mat-tab-group>
