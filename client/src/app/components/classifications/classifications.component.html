<mat-form-field appearance="fill">
    <mat-label>Classification</mat-label>
    <mat-select [(value)]="id" (selectionChange)="onClassificationChange($event)">
        <mat-option *ngFor="let c of all" [value]="c.id">
            {{c.name}}
        </mat-option>
    </mat-select>
</mat-form-field>

<mat-tab-group *ngIf="id">
    <mat-tab label="Map">
        <app-map [mountains]="mountains"></app-map>
    </mat-tab>
    <mat-tab label="List">
        <app-mountain-table [mountains]="mountains"></app-mountain-table>
    </mat-tab>
</mat-tab-group>
